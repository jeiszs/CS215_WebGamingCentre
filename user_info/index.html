<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Dashboard</title>
    <link rel="stylesheet" type="text/css" href="style.css">

</head>


<body>
    <header>
        <div class="global-header">
            <a href="dashboard.html"><img src="" alt="Logo" style="float:left;"></a>
            <a href="dashboard.html">Dashboard</a>
            <a href="user_info.html">Game History</a>
            <a href="user_info.html">Sign Out</a>
            <a href="user_info.html"><img src="" alt="Avatar" style="float:right"></a>
        </div>
    </header>

    <form id="user-basic-info">
        <a href="user_info.html"><img src="" alt="Avatar" style="float: left;"></a>

        <label for="nickname">Nickname:</label>
        <input type="text" id="nickname" name="nickname"><br><br>

        <label for="userpfp">Upload Your Profile Picture:</label>
        <input type="file" id="userpfp" name="userpfp" accept="image/png, image/jpeg, image/jpg"><br><br>

        <button type="button">Delete Avatar</button>
    </form>

    <form id="user-changing-info">
        <label for="useremail">Email:</label>
        <input type="email" id="useremail" name="useremail"><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="userpw">Password:</label>
        <input type="password" id="userpw" name="userpw"><br><br>

        <label for="userrepw">Password:</label>
        <input type="password" id="userrepw" name="userrepw"><br><br>

    </form>

    <div id="editables">
        <button type="button">Cancel</button>
        <button type="button">Save</button>
    </div>

    <button type="button">Delete Account</button>

    <footer>
        <a href="../index.html">Return to Home</a>
    </footer>

</body>

</html>
